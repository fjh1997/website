media:
  input: static/images
  output: /images

content:
  - name: news
    label: 新闻动态
    path: content/news
    type: collection
    view:
      fields: [title, date]
      primary: title
      sort: date
      default: descending
    fields:
      - name: title
        label: 标题
        type: string
      - name: date
        label: 发布日期
        type: date
      - name: draft
        label: 草稿
        type: boolean
        default: false
      - name: description
        label: 页面描述 (SEO)
        type: string
        description: 用于搜索引擎的页面描述
      - name: image
        label: 封面图片
        type: image
      - name: body
        label: 正文内容
        type: rich-text

  - name: notice
    label: 通知
    path: content/notice
    type: collection
    view:
      fields: [title, date]
      primary: title
      sort: date
      default: descending
    fields:
      - name: title
        label: 标题
        type: string
      - name: date
        label: 发布日期
        type: date
      - name: draft
        label: 草稿
        type: boolean
        default: false
      - name: description
        label: 页面描述 (SEO)
        type: string
      - name: body
        label: 正文内容
        type: rich-text

  - name: announcement
    label: 公告
    path: content/announcement
    type: collection
    view:
      fields: [title, date]
      primary: title
      sort: date
      default: descending
    fields:
      - name: title
        label: 标题
        type: string
      - name: date
        label: 发布日期
        type: date
      - name: draft
        label: 草稿
        type: boolean
        default: false
      - name: description
        label: 页面描述 (SEO)
        type: string
      - name: body
        label: 正文内容
        type: rich-text

  - name: party
    label: 校园合作
    path: content/party
    type: collection
    view:
      fields: [title, date]
      primary: title
      sort: date
      default: descending
    fields:
      - name: title
        label: 标题
        type: string
      - name: date
        label: 发布日期
        type: date
      - name: draft
        label: 草稿
        type: boolean
        default: false
      - name: description
        label: 页面描述 (SEO)
        type: string
      - name: image
        label: 封面图片
        type: image
      - name: body
        label: 正文内容
        type: rich-text

  - name: about
    label: 集团概况
    path: content/about/overview.md
    type: file
    fields:
      - name: title
        label: 页面标题
        type: string
      - name: date
        label: 更新日期
        type: date
      - name: description
        label: 页面描述 (SEO)
        type: string
      - name: body
        label: 正文内容
        type: rich-text

  - name: invest
    label: 招商引资
    path: content/invest/contact.md
    type: file
    fields:
      - name: title
        label: 页面标题
        type: string
      - name: date
        label: 更新日期
        type: date
      - name: description
        label: 页面描述 (SEO)
        type: string
      - name: body
        label: 正文内容
        type: rich-text

  - name: site-config
    label: 站点配置
    path: hugo.toml
    type: file
    format: toml
    fields:
      - name: title
        label: 网站标题
        type: string
      - name: baseURL
        label: 网站地址
        type: string
      - name: params.description
        label: 网站描述 (SEO)
        type: string
      - name: params.keywords
        label: 网站关键词 (SEO)
        type: string
